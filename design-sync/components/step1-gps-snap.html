<!-- @dsCard group="Component" -->
<meta charset="utf-8"/><title>Bước 1 — GPS snap tới điểm xuất phát</title>
<style>
:root{
  --ground:#F2F3F1; --card:#FFFFFF; --panel:#ECEEE8; --badge:#E6E8E2;
  --line:#E1E3DC; --hairline:#E9EBE5;
  --ink:#121315; --mute:#70766F; --soft:#4A4F4B;
  --go:#C9E265; --go-ink:#182200;
  --terra:#B0765A; --terra-deep:#8E5136; --terra-bg:#F4E8E1;
  --gold:#A98F5E; --gold-deep:#776132; --gold-bg:#F2ECDD;
  --sage:#6FA08A; --sage-deep:#3E6B57; --sage-bg:#E4EEE8;
  --bluegray:#7E93AC; --bluegray-deep:#4E637C; --bluegray-bg:#E7ECF1;
  --pine:#16281A; --lime:#C9E265; --cream:#EAF1E4; --mist:#A9CDD8; --ember:#FF5233;
  --island:#FAFBF8; --route-gold:#E8B400; --progress-gold:#FFD100;
}
*{box-sizing:border-box;margin:0}
body{background:var(--ground);font-family:"Segoe UI","SF Pro Text",-apple-system,Roboto,Arial,sans-serif;
  color:var(--ink);-webkit-font-smoothing:antialiased;padding:18px}
.young{font-family:Georgia,'Times New Roman',serif;font-weight:700;letter-spacing:.2px}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;overflow:hidden}
.k{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--mute)}
.v{font-size:16px;font-weight:600;margin-top:4px;font-variant-numeric:tabular-nums;color:var(--ink)}
.chip{display:inline-block;padding:4px 11px;border-radius:999px;font-size:10.5px;font-weight:700;letter-spacing:.3px}
.chip.easy{background:var(--sage-bg);color:var(--sage-deep)}
.chip.std{background:var(--gold-bg);color:var(--gold-deep)}
.chip.hard{background:var(--terra-bg);color:var(--terra-deep)}
.confirmbtn{display:block;width:100%;border:none;border-radius:999px;background:var(--go);color:var(--go-ink);
  font-weight:800;font-size:13.5px;letter-spacing:.6px;padding:14px;cursor:pointer}
.sec{font-family:Georgia,serif;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--ink);margin:16px 0 8px;font-weight:700}
.note{font-size:11px;color:var(--mute);margin-top:10px;line-height:1.5}
.mapph{position:relative;height:150px;border-radius:18px;overflow:hidden;border:1px solid var(--line);
    background:repeating-radial-gradient(circle at 70% 30%, #E9EBE5 0 14px, #F2F3F1 14px 28px)}
  .me{position:absolute;left:30px;bottom:24px;width:15px;height:15px;border-radius:50%;background:var(--lime);border:3px solid var(--ink)}
  .dst{position:absolute;right:28px;top:26px;width:13px;height:13px;border-radius:50%;background:var(--lime);border:2.5px solid var(--ink)}
  .pill{position:absolute;left:10px;bottom:10px;background:var(--ink);color:var(--cream);border-radius:999px;padding:5px 11px;font-size:9.5px;letter-spacing:.6px}</style>
<h2 class="young" style="font-size:20px">Bước 1 · Tới điểm xuất phát</h2>
  <div style="font-size:12px;color:var(--mute);margin:2px 0 12px">Từ vị trí GPS thật của bạn (có thể cách 20 km) — map dẫn tới điểm đầu cung</div>
  <div class="mapph"><span class="me"></span><span class="dst"></span>
    <svg viewBox="0 0 320 150" style="position:absolute;inset:0;width:100%;height:100%">
      <path d="M38 118 C 90 96, 150 108, 200 74 S 272 44, 286 34" fill="none" stroke="#E8B400" stroke-width="3.5" stroke-dasharray="7 6" stroke-linecap="round"/></svg>
    <span class="pill">CÁCH ĐIỂM XUẤT PHÁT 3,2 KM · ~45 PHÚT ĐI BỘ</span></div>
  <button class="confirmbtn" style="margin-top:12px">📍 SNAP GPS — DẪN TỚI ĐIỂM XUẤT PHÁT</button>
  <div class="sec">Sheet xác nhận — CHỈ hiện khi đã tới ≤ 50 m</div>
  <div class="card" style="padding:15px 16px">
    <b style="font-size:14px">✔ Đã tới điểm xuất phát</b>
    <div style="font-size:12px;color:var(--mute);margin:4px 0 10px">GPS cách điểm đầu 18 m — chụp 1 ảnh thực địa để mở Bước 2</div>
    <button class="confirmbtn">📷 CHỤP ẢNH — BẮT ĐẦU BƯỚC 2</button>
  </div>
