<style>
:root{
  --ground:#F2F3F1; --card:#FFFFFF; --panel:#ECEEE8; --badge:#E6E8E2;
  --line:#E1E3DC; --hairline:#E9EBE5;
  --ink:#121315; --mute:#70766F; --soft:#4A4F4B;
  --go:#C9E265; --go-ink:#182200;
  --terra:#B0765A; --terra-deep:#8E5136; --terra-bg:#F4E8E1;
  --gold:#A98F5E; --gold-deep:#776132; --gold-bg:#F2ECDD;
  --sage:#6FA08A; --sage-deep:#3E6B57; --sage-bg:#E4EEE8;
  --bluegray:#7E93AC; --bluegray-deep:#4E637C; --bluegray-bg:#E7ECF1;
  --pine:#16281A; --lime:#C9E265; --cream:#EAF1E4; --mist:#A9CDD8; --ember:#FF5233;
  --island:#FAFBF8; --route-gold:#E8B400; --progress-gold:#FFD100;
}
*{box-sizing:border-box;margin:0}
body{background:var(--ground);font-family:"Segoe UI","SF Pro Text",-apple-system,Roboto,Arial,sans-serif;
  color:var(--ink);-webkit-font-smoothing:antialiased;padding:18px}
.young{font-family:Georgia,'Times New Roman',serif;font-weight:700;letter-spacing:.2px}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;overflow:hidden}
.k{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--mute)}
.v{font-size:16px;font-weight:600;margin-top:4px;font-variant-numeric:tabular-nums;color:var(--ink)}
.chip{display:inline-block;padding:4px 11px;border-radius:999px;font-size:10.5px;font-weight:700;letter-spacing:.3px}
.chip.easy{background:var(--sage-bg);color:var(--sage-deep)}
.chip.std{background:var(--gold-bg);color:var(--gold-deep)}
.chip.hard{background:var(--terra-bg);color:var(--terra-deep)}
.confirmbtn{display:block;width:100%;border:none;border-radius:999px;background:var(--go);color:var(--go-ink);
  font-weight:800;font-size:13.5px;letter-spacing:.6px;padding:14px;cursor:pointer}
.sec{font-family:Georgia,serif;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--ink);margin:16px 0 8px;font-weight:700}
.note{font-size:11px;color:var(--mute);margin-top:10px;line-height:1.5}
.wrap{position:relative;background:var(--island);border:1px solid var(--line);border-radius:22px;overflow:hidden}
  svg{width:100%;display:block}
  .pct{position:absolute;left:14px;bottom:12px;font-size:15px;color:#B98A00}</style>
