<meta charset="utf-8"/><title>HUD dẫn đường COROS trên map</title>
<style>
:root{
  --ground:#F2F3F1; --card:#FFFFFF; --panel:#ECEEE8; --badge:#E6E8E2;
  --line:#E1E3DC; --hairline:#E9EBE5;
  --ink:#121315; --mute:#70766F; --soft:#4A4F4B;
  --go:#C9E265; --go-ink:#182200;
  --terra:#B0765A; --terra-deep:#8E5136; --terra-bg:#F4E8E1;
  --gold:#A98F5E; --gold-deep:#776132; --gold-bg:#F2ECDD;
  --sage:#6FA08A; --sage-deep:#3E6B57; --sage-bg:#E4EEE8;
  --bluegray:#7E93AC; --bluegray-deep:#4E637C; --bluegray-bg:#E7ECF1;
  --pine:#16281A; --lime:#C9E265; --cream:#EAF1E4; --mist:#A9CDD8; --ember:#FF5233;
  --island:#FAFBF8; --route-gold:#E8B400; --progress-gold:#FFD100;
}
*{box-sizing:border-box;margin:0}
body{background:var(--ground);font-family:"Segoe UI","SF Pro Text",-apple-system,Roboto,Arial,sans-serif;
  color:var(--ink);-webkit-font-smoothing:antialiased;padding:18px}
.young{font-family:Georgia,'Times New Roman',serif;font-weight:700;letter-spacing:.2px}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;overflow:hidden}
.k{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--mute)}
.v{font-size:16px;font-weight:600;margin-top:4px;font-variant-numeric:tabular-nums;color:var(--ink)}
.chip{display:inline-block;padding:4px 11px;border-radius:999px;font-size:10.5px;font-weight:700;letter-spacing:.3px}
.chip.easy{background:var(--sage-bg);color:var(--sage-deep)}
.chip.std{background:var(--gold-bg);color:var(--gold-deep)}
.chip.hard{background:var(--terra-bg);color:var(--terra-deep)}
.confirmbtn{display:block;width:100%;border:none;border-radius:999px;background:var(--go);color:var(--go-ink);
  font-weight:800;font-size:13.5px;letter-spacing:.6px;padding:14px;cursor:pointer}
.sec{font-family:Georgia,serif;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--ink);margin:16px 0 8px;font-weight:700}
.note{font-size:11px;color:var(--mute);margin-top:10px;line-height:1.5}
.scr{position:relative;height:430px;border-radius:22px;overflow:hidden;border:1px solid var(--line);
    background:repeating-radial-gradient(circle at 30% 60%, #E4EEE8 0 16px, #F2F3F1 16px 32px),
               repeating-radial-gradient(circle at 80% 20%, #E9EBE5 0 12px, #F2F3F1 12px 24px)}
  .repbar{position:absolute;left:0;right:0;top:0;padding:13px 10px 24px;color:#fff;text-align:center;
    background:linear-gradient(180deg,rgba(38,68,110,.78),rgba(120,150,190,.28) 70%,transparent)}
  .repbar .lg{font-size:9px;letter-spacing:3px;font-weight:700;opacity:.9;margin-bottom:7px}
  .repbar .rw{display:flex}.repbar .c{flex:1}
  .repbar .i{font-size:11px;opacity:.85}
  .repbar b{display:block;font-size:21px;font-variant-numeric:tabular-nums;text-shadow:0 1px 6px rgba(0,0,0,.35)}
  .repbar .c span{font-size:9.5px;opacity:.85}
  .tools{position:absolute;right:11px;top:86px;display:flex;flex-direction:column;gap:7px}
  .tools span{width:40px;height:40px;border-radius:12px;background:rgba(242,243,241,.95);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800}
  .sos{position:absolute;right:11px;bottom:96px;width:44px;height:44px;border-radius:50%;background:var(--ember);
    color:#fff;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px #FF523366}
  .mstats{position:absolute;left:11px;right:11px;bottom:11px;background:rgba(242,243,241,.96);border:1px solid var(--line);
    border-radius:16px;display:flex;padding:10px 6px;text-align:center}
  .mstats>div{flex:1}.mstats b{font-size:15px;font-variant-numeric:tabular-nums}
  .mstats span{display:block;font-size:8.5px;letter-spacing:1px;color:var(--mute);margin-top:2px}</style>
<div class="scr">
    <div class="repbar"><div class="lg">◆ POTTER · DẪN ĐƯỜNG THEO CUNG</div>
      <div class="rw"><div class="c"><div class="i">🥾</div><b>4.82</b><span>km</span></div>
      <div class="c"><div class="i">⛰</div><b>1.912</b><span>m</span></div>
      <div class="c"><div class="i">📈</div><b>640</b><span>m leo</span></div>
      <div class="c"><div class="i">🕐</div><b>2:10</b><span>giờ đi (ước)</span></div></div></div>
    <div class="tools"><span>DẪN</span><span>VT</span><span>NÚI</span><span>◎</span></div>
    <span class="sos">SOS</span>
    <div class="mstats"><div><b>17.2</b><span>KM</span></div><div><b>1880</b><span>TỔNG LEO</span></div>
      <div><b>2865</b><span>ĐỈNH</span></div><div><b style="color:var(--sage-deep)">Tà Xùa</b><span>GPX THẬT</span></div></div>
  </div>
  <p class="note">Slot theo docs/11 §4.2: TOP-HUD (repbar) · RIGHT-RAIL (chế độ map) · RIGHT-ACTION (SOS — bất khả xâm phạm) · BOTTOM-STATS. Một HUD mỗi trạng thái.</p>
