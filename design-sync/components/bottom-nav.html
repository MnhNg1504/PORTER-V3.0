<!-- @dsCard group="Component" -->
<meta charset="utf-8"/><title>Bottom nav 5 tab + FAB la bàn</title>
<style>
:root{
  --ground:#F2F3F1; --card:#FFFFFF; --panel:#ECEEE8; --badge:#E6E8E2;
  --line:#E1E3DC; --hairline:#E9EBE5;
  --ink:#121315; --mute:#70766F; --soft:#4A4F4B;
  --go:#C9E265; --go-ink:#182200;
  --terra:#B0765A; --terra-deep:#8E5136; --terra-bg:#F4E8E1;
  --gold:#A98F5E; --gold-deep:#776132; --gold-bg:#F2ECDD;
  --sage:#6FA08A; --sage-deep:#3E6B57; --sage-bg:#E4EEE8;
  --bluegray:#7E93AC; --bluegray-deep:#4E637C; --bluegray-bg:#E7ECF1;
  --pine:#16281A; --lime:#C9E265; --cream:#EAF1E4; --mist:#A9CDD8; --ember:#FF5233;
  --island:#FAFBF8; --route-gold:#E8B400; --progress-gold:#FFD100;
}
*{box-sizing:border-box;margin:0}
body{background:var(--ground);font-family:"Segoe UI","SF Pro Text",-apple-system,Roboto,Arial,sans-serif;
  color:var(--ink);-webkit-font-smoothing:antialiased;padding:18px}
.young{font-family:Georgia,'Times New Roman',serif;font-weight:700;letter-spacing:.2px}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;overflow:hidden}
.k{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--mute)}
.v{font-size:16px;font-weight:600;margin-top:4px;font-variant-numeric:tabular-nums;color:var(--ink)}
.chip{display:inline-block;padding:4px 11px;border-radius:999px;font-size:10.5px;font-weight:700;letter-spacing:.3px}
.chip.easy{background:var(--sage-bg);color:var(--sage-deep)}
.chip.std{background:var(--gold-bg);color:var(--gold-deep)}
.chip.hard{background:var(--terra-bg);color:var(--terra-deep)}
.confirmbtn{display:block;width:100%;border:none;border-radius:999px;background:var(--go);color:var(--go-ink);
  font-weight:800;font-size:13.5px;letter-spacing:.6px;padding:14px;cursor:pointer}
.sec{font-family:Georgia,serif;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--ink);margin:16px 0 8px;font-weight:700}
.note{font-size:11px;color:var(--mute);margin-top:10px;line-height:1.5}
nav{height:74px;background:var(--ground);border-top:1px solid var(--hairline);display:flex;align-items:stretch;max-width:390px}
  .tb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:10px;color:var(--mute);position:relative}
  .tb svg{width:22px;height:22px;color:#899086}
  .tb.on{color:var(--ink);font-weight:700}.tb.on svg{color:var(--ink)}
  .tb.on::before{content:'';position:absolute;top:6px;width:18px;height:3px;border-radius:2px;background:var(--go)}
  .fabw{flex:1;display:flex;align-items:center;justify-content:center}
  .fab{width:46px;height:46px;border-radius:50%;background:var(--go);display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 14px #C9E26588}
  .fab svg{width:24px;height:24px;color:var(--go-ink)}</style>
<script>/**
 * BỘ ICON PORTER — tuân thủ Porter Brand Guidelines mục "Bảng icon UI · 28 icon":
 * "Phong cách nét mảnh (outline), grid 24px, stroke 1.6px, bo tròn đầu nét.
 *  Dùng màu pine trên nền sáng, cream/lime trên nền tối."
 * (Kit gốc chỉ có quy tắc, chưa kèm file icon — bộ này tạo mới theo đúng quy tắc đó.)
 *
 * 2 dạng dùng:
 * 1. ICON UI (outline, currentColor): <svg class="pico" style="color:#16281A"><use href="#ic-camp"/></svg>
 * 2. PIN MARKER (đầu tròn màu brand như ảnh mẫu Route covered): <use href="#pin-camp"/>
 *    — pin = nền tròn màu semantic + glyph outline 1.6px bên trong.
 * Màu semantic: Mist #A9CDD8 trại/nước · Ember #FF5233 cảnh báo · Lime #C9E265 checkpoint/hành động
 * · Cream #EAF1E4 trung tính · nét glyph Pine #16281A.
 */
(function(){
// Glyph outline thuần (grid 24, stroke 1.6, round cap/join, dùng currentColor)
const G={
  camp:'<path d="M12 5.5 L19 18.5 H5 Z" fill="none"/><path d="M12 9.5 L14.8 18.5 M12 9.5 L9.2 18.5" fill="none"/>',
  warn:'<circle cx="12" cy="12" r="2" fill="currentColor" stroke="none"/><path d="M7.8 7.8a6 6 0 0 0 0 8.4 M16.2 7.8a6 6 0 0 1 0 8.4" fill="none"/>',
  check:'<path d="M9 12.7V8.9a1 1 0 0 1 2 0v2.6 M11 11.5V7a1 1 0 0 1 2 0v4.5 M13 11.5V7.7a1 1 0 0 1 2 0v4.2 M15 12.1v-2.2a1 1 0 0 1 2 0v4.5c0 2.9-1.8 4.7-4.5 4.7-2.3 0-3.5-1.1-4.7-3l-1.2-2a1 1 0 0 1 1.7-1.1l.9 1.3" fill="none"/>',
  water:'<path d="M12 5.5c2.8 3.6 4.5 5.9 4.5 8.1a4.5 4.5 0 0 1-9 0c0-2.2 1.7-4.5 4.5-8.1Z" fill="none"/>',
  summit:'<path d="M9.5 19V5.8 M9.5 6.2h6.6l-2 2.5 2 2.5H9.5" fill="none"/>',
  photo:'<rect x="5.7" y="8.5" width="12.6" height="9.3" rx="2" fill="none"/><path d="M9 8.5l1.4-2.1h3.2L15 8.5" fill="none"/><circle cx="12" cy="13" r="2.6" fill="none"/>',
  guide:'<circle cx="12" cy="9" r="2.8" fill="none"/><path d="M6.8 18.5c1-3.1 2.9-4.4 5.2-4.4s4.2 1.3 5.2 4.4" fill="none"/>',
  home:'<path d="M5.5 11.5 L12 5.5 L18.5 11.5 M7 10.2V18.5h10V10.2 M10.4 18.5v-4.6h3.2v4.6" fill="none"/>',
  routes:'<path d="M4.5 18.5 L9.5 8.5 L12.8 14.5 L15 10.5 L19.5 18.5 Z" fill="none"/><circle cx="15" cy="6.8" r="1.4" fill="none"/>',
  chat:'<path d="M5.5 7.5h13v8.4h-7.6L7.5 19v-3.1h-2Z" fill="none" stroke-linejoin="round"/>',
  compass:'<circle cx="12" cy="12" r="7.5" fill="none"/><path d="M14.8 9.2 L13 13 L9.2 14.8 L11 11 Z" fill="currentColor" stroke="none"/>',
  s:'<text x="12" y="16.3" text-anchor="middle" font-family="Segoe UI,Arial" font-size="11.5" font-weight="700" fill="currentColor" stroke="none">S</text>',
  f:'<text x="12" y="16.3" text-anchor="middle" font-family="Segoe UI,Arial" font-size="11.5" font-weight="700" fill="currentColor" stroke="none">F</text>',
  e:'<text x="12" y="16.3" text-anchor="middle" font-family="Segoe UI,Arial" font-size="11.5" font-weight="700" fill="currentColor" stroke="none">E</text>',
};
// Nền pin theo semantic (đầu tròn phẳng như ảnh mẫu)
const BG={camp:'#A9CDD8',warn:'#FF5233',check:'#C9E265',water:'#A9CDD8',summit:'#EAF1E4',
  photo:'#EAF1E4',guide:'#C9E265',home:'#EAF1E4',routes:'#EAF1E4',chat:'#EAF1E4',compass:'#C9E265',s:'#EAF1E4',f:'#EAF1E4',e:'#EAF1E4'};
// Màu glyph trên nền pin: Ember dùng nét cream cho tương phản, còn lại nét Pine
const FG={warn:'#EAF1E4'};

let sym='';
for(const k in G){
  const stroke=`stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"`;
  // Icon UI outline (currentColor — pine trên nền sáng, cream/lime trên nền tối)
  sym+=`<symbol id="ic-${k}" viewBox="0 0 24 24"><g ${stroke}>${G[k]}</g></symbol>`;
  // Pin marker: nền tròn màu + glyph
  sym+=`<symbol id="pin-${k}" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="11.2" fill="${BG[k]}"/>
    <g color="${FG[k]??'#16281A'}" ${stroke}>${G[k].replace(/currentColor/g,FG[k]??'#16281A')}</g>
  </symbol>`;
}
const SPRITE=`<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">${sym}</svg>`;
function inject(){
  const div=document.createElement('div');
  div.innerHTML=SPRITE;
  document.body.insertBefore(div.firstElementChild,document.body.firstChild);
}
if(document.body)inject();else addEventListener('DOMContentLoaded',inject);
})();
</script><nav><span class="tb"><svg><use href="#ic-home"/></svg>Cộng đồng</span>
  <span class="tb on"><svg><use href="#ic-routes"/></svg>Cung đường</span>
  <span class="fabw"><span class="fab"><svg><use href="#ic-compass"/></svg></span></span>
  <span class="tb"><svg><use href="#ic-chat"/></svg>Tin nhắn</span>
  <span class="tb"><svg><use href="#ic-guide"/></svg>Hồ sơ</span></nav>
  <p class="note">FAB = CHỈ logo la bàn Lime 46px, dóng ngang hàng icon tab (quyết định đã chốt). Tab active: vạch lime trên + chữ đậm.</p>
