<!-- @dsCard group="Component" -->
<meta charset="utf-8"/><title>Sheet mua — 2 gói</title>
<style>
:root{
  --ground:#F2F3F1; --card:#FFFFFF; --panel:#ECEEE8; --badge:#E6E8E2;
  --line:#E1E3DC; --hairline:#E9EBE5;
  --ink:#121315; --mute:#70766F; --soft:#4A4F4B;
  --go:#C9E265; --go-ink:#182200;
  --terra:#B0765A; --terra-deep:#8E5136; --terra-bg:#F4E8E1;
  --gold:#A98F5E; --gold-deep:#776132; --gold-bg:#F2ECDD;
  --sage:#6FA08A; --sage-deep:#3E6B57; --sage-bg:#E4EEE8;
  --bluegray:#7E93AC; --bluegray-deep:#4E637C; --bluegray-bg:#E7ECF1;
  --pine:#16281A; --lime:#C9E265; --cream:#EAF1E4; --mist:#A9CDD8; --ember:#FF5233;
  --island:#FAFBF8; --route-gold:#E8B400; --progress-gold:#FFD100;
}
*{box-sizing:border-box;margin:0}
body{background:var(--ground);font-family:"Segoe UI","SF Pro Text",-apple-system,Roboto,Arial,sans-serif;
  color:var(--ink);-webkit-font-smoothing:antialiased;padding:18px}
.young{font-family:Georgia,'Times New Roman',serif;font-weight:700;letter-spacing:.2px}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;overflow:hidden}
.k{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--mute)}
.v{font-size:16px;font-weight:600;margin-top:4px;font-variant-numeric:tabular-nums;color:var(--ink)}
.chip{display:inline-block;padding:4px 11px;border-radius:999px;font-size:10.5px;font-weight:700;letter-spacing:.3px}
.chip.easy{background:var(--sage-bg);color:var(--sage-deep)}
.chip.std{background:var(--gold-bg);color:var(--gold-deep)}
.chip.hard{background:var(--terra-bg);color:var(--terra-deep)}
.confirmbtn{display:block;width:100%;border:none;border-radius:999px;background:var(--go);color:var(--go-ink);
  font-weight:800;font-size:13.5px;letter-spacing:.6px;padding:14px;cursor:pointer}
.sec{font-family:Georgia,serif;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--ink);margin:16px 0 8px;font-weight:700}
.note{font-size:11px;color:var(--mute);margin-top:10px;line-height:1.5}
.sheet{max-width:360px;margin:0 auto;background:var(--card);border-radius:26px 26px 20px 20px;padding:18px 16px;border:1px solid var(--line)}
  .buyrow{display:flex;justify-content:space-between;gap:12px;padding:9px 2px;font-size:12.5px;border-bottom:1px solid var(--hairline)}
  .buyrow span{color:var(--mute)}
  .pkg{display:flex;gap:10px;align-items:center;padding:10px 11px;border:1.5px solid var(--line);border-radius:13px;margin:8px 0;font-size:12.5px;cursor:pointer}
  .pkg.on{border-color:var(--ink)}
  .pkr{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--line);flex-shrink:0}
  .pkg.on .pkr{border-width:5px;border-color:var(--ink)}
  .pkn{font-size:10.5px;color:var(--terra-deep)}
  .waiver{display:flex;gap:9px;background:var(--terra-bg);border-radius:13px;padding:11px 12px;font-size:11px;line-height:1.5;color:var(--terra-deep);margin:12px 0}</style>
<div class="sheet">
    <h3 class="young" style="font-size:17px;margin-bottom:10px">XÁC NHẬN MUA CUNG</h3>
    <div class="buyrow"><span>Cung</span><b>Tà Xùa – Sống lưng khủng long</b></div>
    <div class="pkg"><span class="pkr"></span>
      <span style="flex:1"><b>Tự đi</b> · GPX dẫn đường + checkpoint<br/>
      <span class="pkn">Cấp 1 không mua được gói này với cung Khó (docs/04)</span></span><b>150.000đ</b></div>
    <div class="pkg on"><span class="pkr"></span>
      <span style="flex:1"><b>Có guide</b> · A Của ★ 4.9 đi kèm + support</span><b>350.000đ</b></div>
    <div class="buyrow"><span>Độ khó</span><b style="color:var(--terra-deep)">Khó — 17,2km · +1.880m</b></div>
    <div class="buyrow"><span>Thanh toán</span><b>350.000đ · VNPay/MoMo</b></div>
    <label class="waiver"><input type="checkbox" checked/> Tôi xác nhận đủ sức khoẻ, hiểu rủi ro trekking cung Khó và đồng ý
      <b>Bản miễn trừ trách nhiệm</b>. POTTER là nền tảng kết nối — an toàn do tôi và guide chịu trách nhiệm.</label>
    <button class="confirmbtn">XÁC NHẬN &amp; THANH TOÁN 350.000đ</button>
  </div>
