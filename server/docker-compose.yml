version: "3.9"
services:
  db:
    image: postgis/postgis:16-3.4
    container_name: potter-db
    environment:
      POSTGRES_USER: potter
      POSTGRES_PASSWORD: potter_dev_only
      POSTGRES_DB: potter
    ports:
      - "5432:5432"
    volumes:
      - potter_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U potter"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    container_name: potter-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
    env_file: .env
    ports:
      - "3000:3000"
    profiles: ["full"] # `docker compose --profile full up` khi muốn chạy cả API trong Docker

volumes:
  potter_pgdata:
