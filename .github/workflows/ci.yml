# CI POTTER 3.0 (checklist §8 — build/test tự động mỗi lần push)
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  app:
    name: App RN — typecheck + test
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: app }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npx jest --ci

  server:
    name: Server NestJS — typecheck
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: server }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run typecheck
